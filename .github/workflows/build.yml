# Playwright-sample-ts/.github/workflows/test.yml
name: Run Playwright Tests
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      actions: read  # 権限をここで明示的に指定
    steps:
      - uses: actions/checkout@v4

      # 公式ghコマンドで、Appリポジトリの最新成功ワークフローからArtifactを落とす
      - name: Download App JAR with gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 最新の成功したワークフロー実行IDを取得
          RUN_ID=$(gh run list --workflow build.yml --repo YusukeKushi/SampleSpringApp --status success --limit 1 --json databaseId -q ".[0].databaseId")
          
          # 2. そのIDからArtifactをダウンロード
          gh run download $RUN_ID --repo YusukeKushi/SampleSpringApp --name app-jar
          
      - name: Setup and Run Tests
        run: |
          # （以下、以前と同じようにテストを実行する手順）
          java -jar *.jar &
          npx wait-on http://localhost:8080
          npx playwright test