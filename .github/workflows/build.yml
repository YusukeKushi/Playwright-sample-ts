# Playwright-sample-ts/.github/workflows/test.yml
name: Run Playwright Tests
on:
  repository_dispatch:
    types: [run-playwright-tests]
  push: # 手動テスト用にpushも残しておいてOK

# ここが重要！ワークフロー全体に権限を付与する
permissions:
  contents: read
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 【重要】これが無いとコードがGitHubのサーバー上に展開されません！
      - uses: actions/checkout@v4

      # 1. Javaを先に準備しておく
      - uses: actions/setup-java@v4
        with: 
          java-version: '24' 
          distribution: 'temurin'

      # 2. Node.jsをインストール
      - uses: actions/setup-node@v4
        with:
          node-version: '22' # プロジェクトのバージョンに合わせてください

      # 3. パッケージをインストール
      - name: Install dependencies
        run:  |
          npm install
          npm install -D allure-playwright
          npm install allure-js-commons
          npx playwright install --with-deps

      # 5. actions/checkout を使わず、gh コマンドで必要なソースだけをダウンロードする
      #- name: Checkout manually
      #  env:
      #    GH_TOKEN: ${{ secrets.MY_PAT }}
      #  run: |
      #    gh repo clone YusukeKushi/Playwright-sample-ts .
      
      # 6. あとは同じ手順でビルド成果物を落とす (test)
      - name: Download App JAR
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          RUN_ID=$(gh run list --repo YusukeKushi/SampleSpringApp --status success --limit 1 --json databaseId -q ".[0].databaseId")
          gh run download $RUN_ID --repo YusukeKushi/SampleSpringApp --name app-jar
          
      - name: Setup and Run Tests
        run: |
          # 1. jarファイルを探索してパスを特定（最初に見つかったものを採用）
          JAR_PATH=$(find . -name "*.jar" | head -n 1)
          
          # 念のためのチェック
          if [ -z "$JAR_PATH" ]; then
            echo "Error: JAR file not found!"
            ls -R
            exit 1
          fi
          
          echo "Found JAR: $JAR_PATH"
          
          # 2. 変数化したパスで実行
          java -jar "$JAR_PATH" \
            --spring.profiles.active=test \
            --spring.sql.init.mode=always \
            --spring.jpa.defer-datasource-initialization=true &
          npx wait-on http://localhost:8080
          npx playwright test --reporter=line,allure-playwright
          # 【重要】test-results にある画像を allure-results に移動する
          # これをしないと、Allureは画像ファイルを見つけられません（だがAllure-reportがallure-resultsに入れているのでもう不要？）
          # cp -r test-results/*/*.png allure-results/ || true
        continue-on-error: true

      - name: Debug Screenshot Paths
        if: always()
        run: |
          echo "--- 全ディレクトリの構成 ---"
          find . -type d -name "test-results"
          find . -type d -name "allure-results"
          echo "--- PNGファイルを探す ---"
          find . -name "*.png"

      - name: Generate Allure Report
        if: always() # テスト結果に関わらず実行
        run: |
          echo "--- フォルダの中身を確認 ---"
          ls -R
          echo "--- allure-reportを除去 ---"
          rm -rf allure-report
          
          # allure-results が見当たらない場合、探してみる
          find . -name "allure-results"
          npx allure-commandline generate allure-results -o allure-report --clean

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.MY_PAT }}
          publish_dir: ./allure-report