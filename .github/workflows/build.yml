# Playwright-sample-ts/.github/workflows/test.yml
name: Run Playwright Tests
on: [push]

# ここが重要！ワークフロー全体に権限を付与する
permissions:
  contents: read
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 1. actions/checkout を使わず、gh コマンドで必要なソースだけをダウンロードする
      - name: Checkout manually
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh repo clone YusukeKushi/Playwright-sample-ts .
      
      # 2. あとは同じ手順でビルド成果物を落とす
      - name: Download App JAR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh run list --workflow build.yml --repo YusukeKushi/SampleSpringApp --branch master --status success --limit 1 --json databaseId -q ".[0].databaseId")
          gh run download $RUN_ID --repo YusukeKushi/SampleSpringApp --name app-jar
      - name: Setup and Run Tests
        run: |
          # （以下、以前と同じようにテストを実行する手順）
          java -jar *.jar &
          npx wait-on http://localhost:8080
          npx playwright test